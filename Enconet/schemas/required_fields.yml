# required_fields.yml — wiki frontmatter contract (EPIC 1, Task 1.7)
#
# Required frontmatter per page type in `schemas/page_types.yml`. Checked by
# `scripts/validate_frontmatter.py` (Task 13.3). `n-a` is accepted for structurally
# required but semantically empty fields; a MISSING field is always a failure.

schema_version: "1.0"

# Required on every controlled wiki page regardless of type.
common_required:
  id: "object ID matching the page type's id_pattern (or the page's stable name where id_pattern is null)"
  type: "one of the page_types keys"
  status: "lifecycle status (draft | approved | closed | generated | superseded)"
  content_origin: "generated | human | mixed — who produced the content"
  source: "citation anchoring the page to DB records / crumb IDs / manifests (n-a only where truly none exists)"

per_type_required:
  criterion-evaluation:
    criterion_id: "APP_B_* taxonomy ID"
    applicability: "applicable | not-applicable (per approved ruling, EPIC 8)"
    classification: "rating from vocabularies.ratings"
    evaluation_run: "RUN-id the evaluation belongs to"
  evidence:
    criterion_id: "APP_B_* taxonomy ID or n-a for the aggregate matrix page"
    generated_by: "script name that emitted the page"
  finding:
    evaluation_run: "RUN-id the finding belongs to"
    criterion_id: "APP_B_* taxonomy ID"
    severity: "severity level"
    confidence: "confidence level"
    evidence_refs: "crumb IDs or gap ID (missing-evidence link)"
    basis: "defensible basis for the finding"
    verification_status: "pending | verified | rejected"
    approval_ref: "approvals.csv object_id once approved; n-a while draft"
  action:
    evaluation_run: "RUN-id the action belongs to"
    action_type: "one of vocabularies.action_types"
    linked_to: "FIND-* or GAP-* ID"
    state: "open | closed"
    priority: "true | false"
    approval_ref: "approvals.csv object_id once approved; n-a while draft"
  gate-decision:
    gate: "G1..G7"
    decision: "pending before human review; then approved | rejected | deferred (mirrors approvals.csv)"
    decision_date: "ISO date or n-a while pending"
    reviewer: "human reviewer or n-a while pending"
